name: Self Demo - Android

on:
  push:
    branches:
      - main
    paths:
      - 'android/SelfDemo/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Setup job
        uses: joinself/github-actions-public/setup-job@main
      - name: Publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GHA_TOKEN }}
        run: |
          . ${GITHUB_WORKSPACE}/.ci/env

          id=$(date | md5sum | head -c 8)
          gh workflow run remote-trigger -R joinself/github-workflows-dispatch -r main -f id=${id} -f foo=bar

          sleep 5

          gh run watch -R joinself/github-workflows-dispatch -i 10 --exit-status $(gh run list -R joinself/github-workflows-dispatch -w self-sdk-examples.yml -L1 --json databaseId --jq '.[0].databaseId')

          exit 0

          curl -L -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GHA_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/repos/joinself/github-workflows-dispatch/dispatches -d '{"event_type":"my-event","client_payload":{"foo":"bar"}}'


          cd android/SelfDemo
          ./gradlew :app:assembleDebug

          #gh release delete "android-latest" -y --cleanup-tag || true
          #gh release create "android-latest" --latest=false --notes "" app/build/outputs/apk/debug/*.apk
