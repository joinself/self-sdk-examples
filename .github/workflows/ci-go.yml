name: CI - Go

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ci-go.yml'
      - 'golang/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/ci-go.yml'
      - 'golang/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: golang:1.25.7-trixie
    timeout-minutes: 15
    steps:
      - uses: joinself/actions-public/setup-job@main
      - uses: actions/checkout@v6
      - name: Build
        run: |
          mkdir -m 0755 -p /etc/apt/keyrings
          curl -fsSL https://europe-apt.pkg.dev/doc/repo-signing-key.gpg | gpg --dearmor -o /etc/apt/keyrings/self.gpg
          echo "deb [signed-by=/etc/apt/keyrings/self.gpg] https://europe-apt.pkg.dev/projects/principal-oxide-204416 apt main" > /etc/apt/sources.list.d/self.list
          apt-get update
          apt-get install -y self-sdk=0.85.0-48

          cd golang
          go build -o self-sdk-demo

          tar -czf self-sdk-demo_go_linux_amd64.tar.gz self-sdk-demo
      - uses: actions/upload-artifact@v7
        with:
          name: build-linux-artifacts
          path: golang/self-sdk-demo_go_linux_amd64.tar.gz

  build-mac:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: joinself/actions-public/setup-job@main
      - uses: actions/checkout@v6
      - name: Build
        env:
          C_INCLUDE_PATH: /opt/homebrew/include/
        run: |
          export LIBRARY_PATH="$LIBRARY_PATH:/opt/homebrew/lib"
          brew install joinself/tap/self-sdk@0.85.0-48
          brew install go@1.25
          export PATH="/opt/homebrew/opt/go@1.25/bin:$PATH"
          cd golang
          GOOS=darwin GOARCH=arm64 go build -o self-sdk-demo
          tar -czf self-sdk-demo_go_darwin_arm64.tar.gz self-sdk-demo
      - uses: actions/upload-artifact@v7
        with:
          name: build-mac-artifacts
          path: golang/self-sdk-demo_go_darwin_arm64.tar.gz

  publish:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [build-linux, build-mac]
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-publish
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: joinself/actions-public/setup-job@main
      - uses: actions/download-artifact@v7
        with:
          name: build-linux-artifacts
      - uses: actions/download-artifact@v7
        with:
          name: build-mac-artifacts
      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha256sum self-sdk-demo_go_linux_amd64.tar.gz | awk '{print $1}' > self-sdk-demo_go_linux_amd64.tar.gz.sha256
          sha256sum self-sdk-demo_go_darwin_arm64.tar.gz | awk '{print $1}' > self-sdk-demo_go_darwin_arm64.tar.gz.sha256
          gh release upload "latest" *.tar.gz *.sha256 --clobber
